<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
</head>
<body>
    <h1>👤회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>
    <form action="signUpResult.html" method="get">
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="user-id">아이디:</label>
                <input type="text" id="user-id" name="userId" placeholder="4~15자 영문/숫자" minlength="4" maxlength="15" pattern="[A-Za-z0-9]+" required> (필수)
            </p>
            <p>
                <label for="password">비밀번호:</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력" minlength="8" required> (필수)
            </p>
            <p>
                <label for="email-id">이메일:</label>
                <input
                    type="text"
                    id="email-id"
                    name="emailId"
                    placeholder="example"
                    required
                >
                @
                <select name="emailDomain" id="email-domain" required>
                    <option value="">도메인 선택</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="naver.com">naver.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
            </p>
        </fieldset>
        <br>
        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="birthday">생년월일:</label>
                <input type="date" id="birthday" name="birthday">
            </p>
            <p>
                성별:
                <input type="radio" id="male" name="gender" value="male" checked>
                <label for="male">남성</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">여성</label>
                <input type="radio" id="none" name="gender" value="none">
                <label for="none">선택안함</label>
            </p>
            <p>
                관심 분야 (중복 선택 가능):<br>
                <input type="checkbox" id="frontend" name="interest" value="frontend">
                <label for="frontend">웹 프론트엔드 (Vue.js/HTML)</label><br>
                <input type="checkbox" id="uiux" name="interest" value="uiux">
                <label for="uiux">UI/UX 디자인 표준</label><br>
                <input type="checkbox" id="backend" name="interest" value="backend">
                <label for="backend">백엔드 &amp; 데이터베이스</label><br>
                <input type="checkbox" id="cloud" name="interest" value="cloud">
                <label for="cloud">클라우드 &amp; 인프라</label>
            </p>
            <p>
                <label for="route">가입 경로:</label>
                <select name="route" id="route">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">검색</option>
                    <option value="friend">지인 추천</option>
                    <option value="sns">SNS</option>
                    <option value="etc">기타</option>
                </select>
            </p>
        </fieldset>
        <br>
        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea
                    id="intro"
                    name="intro"
                    rows="5"
                    cols="45"
                    maxlength="200"
                    placeholder="여기에 내용을 입력하세요 (최대 200자)"
                ></textarea>
            </p>
        </fieldset>
        <br>
        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">
    </form>
</body>
</html>
